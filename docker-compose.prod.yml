services:
  frontend:
    image: ghcr.io/dariusz95/poorbet-frontend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

  gateway:
    image: ghcr.io/dariusz95/poorbet-gateway:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  odds-engine-service:
    image: ghcr.io/dariusz95/poorbet-odds-engine-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  auth-service:
    image: ghcr.io/dariusz95/poorbet-auth-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/${POSTGRES_AUTH_DB}
      - POSTGRES_USER=${POSTGRES_AUTH_USER}
      - POSTGRES_PASSWORD=${POSTGRES_AUTH_PASSWORD}
      - JWT_PRIVATE_KEY_LOCATION=file:/run/keys/private.pem
      - JWT_PUBLIC_KEY_LOCATION=file:/run/keys/public.pem
    volumes:
      - ./secrets/auth-jwt:/run/keys:ro

  match-service:
    image: ghcr.io/dariusz95/poorbet-match-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://match-db:5432/${POSTGRES_MATCH_DB}
      - POSTGRES_USER=${POSTGRES_MATCH_USER}
      - POSTGRES_PASSWORD=${POSTGRES_MATCH_PASSWORD}

  coupon-service:
    image: ghcr.io/dariusz95/poorbet-coupon-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://coupon-db:5432/${POSTGRES_COUPON_DB}
      - POSTGRES_USER=${POSTGRES_COUPON_USER}
      - POSTGRES_PASSWORD=${POSTGRES_COUPON_PASSWORD}

  wallet-service:
    image: ghcr.io/dariusz95/poorbet-wallet-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://wallet-db:5432/${POSTGRES_WALLET_DB}
      - POSTGRES_USER=${POSTGRES_WALLET_USER}
      - POSTGRES_PASSWORD=${POSTGRES_WALLET_PASSWORD}

  notification-service:
    image: ghcr.io/dariusz95/poorbet-notification-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  redis:
    restart: unless-stopped

  rabbitmq:
    restart: unless-stopped

  user-db:
    image: postgres:16
    restart: always

  match-db:
    image: postgres:16
    restart: always
    ports:
      - "127.0.0.1:5432:5432"

  wallet-db:
    image: postgres:16
    restart: always

  coupon-db:
    image: postgres:16
    restart: always

volumes:
  user_data:
    name: poorbet_prod_user_data
  match_data:
    name: poorbet_prod_match_data
  wallet_data:
    name: poorbet_prod_wallet_data
  coupon_data:
    name: poorbet_prod_coupon_data
