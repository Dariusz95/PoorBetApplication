# Produkcja: obrazy z GHCR (Etap 5/6), bez lokalnego builda, bez bind mountów kodu.
#
# Wymaga zmiennej IMAGE_TAG (wersja obrazów, np. v0.1.0 — nigdy "latest", patrz DEPLOY_PLAN.md Etap 5).
# Użycie:
#   IMAGE_TAG=v0.1.0 docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml pull
#   IMAGE_TAG=v0.1.0 docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Tylko frontend i gateway mają porty wystawione na hosta — reszta serwisów i wszystkie bazy
# komunikują się wyłącznie wewnątrz sieci main_network (DNS Compose po nazwie serwisu),
# bez potrzeby publikowania portów. Docelowo (Etap 8) nawet frontend/gateway przestaną
# wystawiać porty bezpośrednio — stanie przed nimi reverse proxy w tej samej sieci.

services:
  frontend:
    image: ghcr.io/dariusz95/poorbet-frontend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "80:8080"

  gateway:
    image: ghcr.io/dariusz95/poorbet-gateway:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  odds-engine-service:
    image: ghcr.io/dariusz95/poorbet-odds-engine-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  auth-service:
    image: ghcr.io/dariusz95/poorbet-auth-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/${POSTGRES_AUTH_DB}
      - POSTGRES_USER=${POSTGRES_AUTH_USER}
      - POSTGRES_PASSWORD=${POSTGRES_AUTH_PASSWORD}

  match-service:
    image: ghcr.io/dariusz95/poorbet-match-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://match-db:5432/${POSTGRES_MATCH_DB}
      - POSTGRES_USER=${POSTGRES_MATCH_USER}
      - POSTGRES_PASSWORD=${POSTGRES_MATCH_PASSWORD}

  coupon-service:
    image: ghcr.io/dariusz95/poorbet-coupon-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://coupon-db:5432/${POSTGRES_COUPON_DB}
      - POSTGRES_USER=${POSTGRES_COUPON_USER}
      - POSTGRES_PASSWORD=${POSTGRES_COUPON_PASSWORD}

  wallet-service:
    image: ghcr.io/dariusz95/poorbet-wallet-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://wallet-db:5432/${POSTGRES_WALLET_DB}
      - POSTGRES_USER=${POSTGRES_WALLET_USER}
      - POSTGRES_PASSWORD=${POSTGRES_WALLET_PASSWORD}

  notification-service:
    image: ghcr.io/dariusz95/poorbet-notification-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  redis:
    restart: unless-stopped

  rabbitmq:
    restart: unless-stopped

  user-db:
    image: postgres:16
    restart: always

  match-db:
    image: postgres:16
    restart: always

  wallet-db:
    image: postgres:16
    restart: always

  coupon-db:
    image: postgres:16
    restart: always

volumes:
  user_data:
    name: poorbet_prod_user_data
  match_data:
    name: poorbet_prod_match_data
  wallet_data:
    name: poorbet_prod_wallet_data
  coupon_data:
    name: poorbet_prod_coupon_data
