teams:
  service:
    url: http://teams-service:8080
    timeout:
      connect: 2s
      read: 3s

simulation:
  service:
    url: http://simulation-service:8080
    timeout:
      connect: 2s
      read: 3s

odds:
  service:
    url: http://odds-service:8080
    timeout:
      connect: 2s
      read: 3s

poorbet:
  security:
    enabled: true
    jwk-set-uri: ${AUTH_JWKS_URI}
    issuer: ${AUTH_ISSUER_URI}
    internal-audience:
      - match-service
    unprotected-paths:
      - /api/match-pool/live
      - /api/match-pool/future

logging:
  level:
    org.springframework.security: DEBUG

spring:
  application:
    name: match-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  devtools:
    restart:
      enabled: true
      poll-interval: 1000
    livereload:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
    cache:
      type: redis
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

match-pool:
  matches-per-pool: 5
  pools-in-advance: 5
  pool-interval-minutes: 3
  schedule-rate-ms: 60000

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://user-service:8080}
    client-id: ${AUTH_SERVICE_CLIENT_ID:match-service}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:secret}
    timeout:
      connect: ${AUTH_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${AUTH_SERVICE_READ_TIMEOUT:3s}
