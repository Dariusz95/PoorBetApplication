spring:
  application:
    name: match-service

poorbet:
  security:
    enabled: true
    jwk-set-uri: ${AUTH_JWKS_URI}
    issuer: ${AUTH_ISSUER_URI}
    internal-audience:
      - match-service
    unprotected-paths:
      - /api/match-pool/live
      - /api/match-pool/future

teams:
  service:
    url: ${TEAMS_SERVICE_URL:http://teams-service:8080}
    timeout:
      connect: ${TEAMS_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${TEAMS_SERVICE_READ_TIMEOUT:3s}

simulation:
  service:
    url: ${SIMULATION_SERVICE_URL:http://simulation-service:8080}
    timeout:
      connect: ${SIMULATION_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${SIMULATION_SERVICE_READ_TIMEOUT:3s}

odds:
  service:
    url: ${ODDS_SERVICE_URL:http://odds-service:8080}
    timeout:
      connect: ${ODDS_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${ODDS_SERVICE_READ_TIMEOUT:3s}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://user-service:8080}
    client-id: ${AUTH_SERVICE_CLIENT_ID:match-service}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:secret}
    timeout:
      connect: ${AUTH_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${AUTH_SERVICE_READ_TIMEOUT:3s}
