spring:
  application:
    name: match-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      org.springframework.boot.autoconfigure: DEBUG

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
    cache:
      type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

poorbet:
  security:
    enabled: true
    jwk-set-uri: ${AUTH_JWKS_URI}
    issuer: ${AUTH_ISSUER_URI}
    internal-audience:
      - match-service
    unprotected-paths:
      - /api/match-pool/live
      - /api/match-pool/future
      - /images/**
      - /actuator/health/**

odds:
  service:
    url: ${ODDS_SERVICE_URL:http://odds-engine-service:8080}
    timeout:
      connect: ${ODDS_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${ODDS_SERVICE_READ_TIMEOUT:3s}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8080}
    client-id: ${AUTH_SERVICE_CLIENT_ID:match-service}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:secret}
    timeout:
      connect: ${AUTH_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${AUTH_SERVICE_READ_TIMEOUT:3s}

messaging:
  source-service: match-service

match-pool:
  matches-per-pool: 5
  pools-in-advance: 5
  pool-interval-minutes: 3
  schedule-rate-ms: 60000

resilience4j:
  circuitbreaker:
    instances:
      oddsEngine:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

app:
  images:
    path: /app/data/images
