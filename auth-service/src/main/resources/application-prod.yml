spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

web:
  cors:
    allowed-origin-patterns:
      - https://poorbet.pl
    allowed-headers:
      - Authorization
      - Requestor-Type
      - Content-Type

logging:
  level:
    root: WARN
    com.poorbet: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
