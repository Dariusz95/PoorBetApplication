spring:
  application:
    name: couponservice
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

poorbet:
  security:
    enabled: true
    issuer: ${AUTH_ISSUER_URI:http://user-service:8080}
    jwk-set-uri: ${AUTH_JWKS_URI:http://user-service:8080/.well-known/jwks.json}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://user-service:8080}
    client-id: ${AUTH_SERVICE_CLIENT_ID:coupon-service}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:secret}
    timeout:
      connect: ${AUTH_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${AUTH_SERVICE_READ_TIMEOUT:3s}

match:
  service:
    url: http://match-service:8080
    timeout:
      connect: 2s
      read: 3s
