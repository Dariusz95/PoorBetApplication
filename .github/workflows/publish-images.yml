name: Publish Docker images

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  publish-services:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [
          auth-service,
          gateway,
          match-service,
          coupon-service,
          wallet-service,
          notification-service,
          odds-engine-service,
        ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/dariusz95/poorbet-${{ matrix.service }}:${{ github.ref_name }}
          secrets: |
            github_actor=${{ github.actor }}
            github_token=${{ secrets.GITHUB_TOKEN }}

  publish-frontend:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/dariusz95/poorbet-frontend:${{ github.ref_name }}

  deploy:
    name: Deploy na VPS
    needs: [publish-services, publish-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zarejestruj zaufany klucz hosta VPS
        # DEPLOY_HOST_KEY to zawartość known_hosts wygenerowana RAZ, ręcznie,
        # z zaufanej maszyny (np. `ssh-keyscan -p <port> <host>`), a NIE
        # pobierana na żywo w CI (unika TOFU/MITM na pierwszym połączeniu).
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Skonfiguruj agenta SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Utwórz katalog scripts/ na serwerze (idempotentne)
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p ${{ secrets.DEPLOY_APP_DIR }}/scripts"

      - name: Skopiuj świeże docker-compose*.yml i deploy.sh z otagowanego commita
        run: |
          scp -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            docker-compose.yml docker-compose.prod.yml \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_APP_DIR }}/"
          scp -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            scripts/deploy.sh \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_APP_DIR }}/scripts/deploy.sh"

      - name: Uruchom deploy.sh na serwerze
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "chmod +x ${{ secrets.DEPLOY_APP_DIR }}/scripts/deploy.sh && IMAGE_TAG=${{ github.ref_name }} ${{ secrets.DEPLOY_APP_DIR }}/scripts/deploy.sh"
