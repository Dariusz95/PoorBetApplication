spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
    cache:
      type: redis

poorbet:
  security:
    enabled: true
    issuer: ${AUTH_ISSUER_URI}
    internal-audience:
      - teams-service
    unprotected-paths:
      - /api/teams/public/**
      - /internal/teams/stats
      - /internal/teams/random
    jwk-set-uri: ${AUTH_JWKS_URI}
