x-auth-config: &auth-config
  AUTH_ISSUER_URI: ${AUTH_ISSUER_URI}
  AUTH_JWKS_URI: ${AUTH_JWKS_URI}

services:
  frontend:
    networks:
      - main_network

  gateway:
    environment:
      <<: *auth-config
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - main_network

  odds-engine-service:
    environment:
      <<: *auth-config
    networks:
      - main_network

  auth-service:
    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *auth-config
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - main_network
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  match-service:
    environment:
      <<: *auth-config
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      match-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      odds-engine-service:
        condition: service_healthy
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  coupon-service:
    environment:
      <<: *auth-config
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      coupon-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  wallet-service:
    environment:
      <<: *auth-config
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      wallet-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  notification-service:
    environment:
      <<: *auth-config
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - main_network

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  user-db:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  match-db:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_MATCH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MATCH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MATCH_DB}
    volumes:
      - match_data:/var/lib/postgresql/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_MATCH_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-db:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_WALLET_USER}
      POSTGRES_PASSWORD: ${POSTGRES_WALLET_PASSWORD}
      POSTGRES_DB: ${POSTGRES_WALLET_DB}
    volumes:
      - wallet_data:/var/lib/postgresql/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_WALLET_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  coupon-db:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_COUPON_USER}
      POSTGRES_PASSWORD: ${POSTGRES_COUPON_PASSWORD}
      POSTGRES_DB: ${POSTGRES_COUPON_DB}
    volumes:
      - coupon_data:/var/lib/postgresql/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_COUPON_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  main_network:
    driver: bridge

volumes:
  odds_models:

  redis_data:
  rabbitmq_data:

  user_data:
  match_data:
  wallet_data:
  coupon_data:
  teams_data:
