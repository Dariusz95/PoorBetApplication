app:
  data-dir: "./data"
  model-dir: "${app.data-dir}/models"

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://user-service:8080}
    client-id: ${AUTH_SERVICE_CLIENT_ID:odds-engine-service}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:secret}
    timeout:
      connect: ${AUTH_SERVICE_CONNECT_TIMEOUT:2s}
      read: ${AUTH_SERVICE_READ_TIMEOUT:3s}

poorbet:
  security:
    enabled: true
    issuer: ${AUTH_ISSUER_URI}
    jwk-set-uri: ${AUTH_JWKS_URI}
    internal-audience:
      - odds-engine-service

training:
  count-per-tier: 7
  repetitions: 5

dataset:
  output-path: "${app.data-dir}/matches.csv"
  delimiter: ","

model:
  path: "${app.model-dir}/model.ser"

team-power:
  tiers:
    WEAK:
      attack:
        min: 30
        max: 50
      defence:
        min: 30
        max: 50

    AVERAGE:
      attack:
        min: 50
        max: 70
      defence:
        min: 50
        max: 70

    STRONG:
      attack:
        min: 70
        max: 100
      defence:
        min: 70
        max: 100