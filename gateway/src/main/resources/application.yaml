server:
  port: 8081

spring:
  codec:
    max-in-memory-size: 2MB
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/users/**

        - id: match-service
          uri: http://match-service:8080
          predicates:
            - Path=/api/match/**, /api/match-pool/**, /api/teams/**, /images/**

        - id: coupon-service
          uri: http://coupon-service:8080
          predicates:
            - Path=/api/coupons/**

        - id: wallet-service
          uri: http://wallet-service:8080
          predicates:
            - Path=/api/wallet/**

        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/notifications/**

        - id: auth-service-docs
          uri: http://auth-service:8080
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

        - id: match-service-docs
          uri: http://match-service:8080
          predicates:
            - Path=/v3/api-docs/match-service
          filters:
            - RewritePath=/v3/api-docs/match-service, /v3/api-docs

        - id: coupon-service-docs
          uri: http://coupon-service:8080
          predicates:
            - Path=/v3/api-docs/coupon-service
          filters:
            - RewritePath=/v3/api-docs/coupon-service, /v3/api-docs

        - id: wallet-service-docs
          uri: http://wallet-service:8080
          predicates:
            - Path=/v3/api-docs/wallet-service
          filters:
            - RewritePath=/v3/api-docs/wallet-service, /v3/api-docs

        - id: notification-service-docs
          uri: http://notification-service:8080
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: match-service
        url: /v3/api-docs/match-service
      - name: coupon-service
        url: /v3/api-docs/coupon-service
      - name: wallet-service
        url: /v3/api-docs/wallet-service
      - name: notification-service
        url: /v3/api-docs/notification-service

poorbet:
  security:
    enabled: false
    jwk-set-uri: ${AUTH_JWKS_URI}
    issuer: ${AUTH_ISSUER_URI}
    unprotected-paths:
      - /api/users/login
      - /api/users/register
      - /api/match-pool/**
      - /api/teams/public/**
      - /api/coupons/public/**
      - /images/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
