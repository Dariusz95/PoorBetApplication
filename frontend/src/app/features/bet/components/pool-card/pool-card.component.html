<div class="rounded-lg border border-app-border bg-app-surface shadow-surface">
  <header
    class="flex items-center justify-between border-b border-app-border px-4 py-3"
  >
    <div>
      <p class="text-xs uppercase tracking-wide text-app-textMuted">Pool</p>
      <p class="text-sm text-app-textMuted">
        {{ pool().scheduledStartTime | date: "HH:mm:ss" }}
      </p>
    </div>

    <div class="text-right">
      <p class="text-xs font-medium text-app-primary">{{ pool().status }}</p>
      <p class="text-sm font-semibold text-app-text">{{ timeRemaining() }}</p>
    </div>
  </header>

  <div class="space-y-3 p-4">
    @for (match of pool().matches; track trackByMatchId($index, match)) {
      <section
        class="rounded-md border border-app-border bg-app-surfaceSoft p-3"
      >
        <div
          class="mb-3 flex items-center justify-between text-sm text-app-text"
        >
          <span class="max-w-[45%] truncate">{{
            match.homeTeamId | slice: 0 : 8
          }}</span>
          <span class="text-app-textMuted">vs</span>
          <span class="max-w-[45%] truncate text-right">{{
            match.awayTeamId | slice: 0 : 8
          }}</span>
        </div>

        <div class="grid grid-cols-3 gap-2">
          <app-odds-button
            label="1"
            [value]="match.odds.homeWin"
          ></app-odds-button>
          <app-odds-button
            label="X"
            [value]="match.odds.draw"
          ></app-odds-button>
          <app-odds-button
            label="2"
            [value]="match.odds.awayWin"
          ></app-odds-button>
        </div>
      </section>
    }
  </div>

  <footer class="border-t border-app-border p-4">
    <pb-button [fullWidth]="true">Postaw kupon</pb-button>
  </footer>
</div>
