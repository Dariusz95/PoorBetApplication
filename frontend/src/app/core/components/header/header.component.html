<ng-container *transloco="let t">
  <header class="app-header">
    <div class="app-header__content">
      <div class="app-header__left">
        <a routerLink="/" class="app-header__logo-link">
          <img src="assets/logo.png" alt="Logo" class="app-header__logo" />
        </a>

        @if (true) {
          <nav class="app-header__nav hidden md:block">
            <ul class="app-header__nav-list">
              @for (item of menuItems; track item.link) {
                <li>
                  <a [routerLink]="item.link" class="app-header__nav-link">
                    {{ t(item.labelKey) }}
                  </a>
                </li>
              }
            </ul>
          </nav>
        }
      </div>

      <div class="app-header__right hidden md:flex">
        <app-language-switcher />
        <app-user-dropdown />
      </div>
    </div>
  </header>
</ng-container>
