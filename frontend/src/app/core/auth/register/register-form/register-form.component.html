<form pbCardBody [formGroup]="form">
  <pb-form-field>
    <pb-label> {{ "auth.email.label" | transloco }}</pb-label>
    <pb-input
      formControlName="email"
      [placeholder]="'auth.email.placeholder' | transloco"
    >
      <app-icon icon="mail" size="m" pbInputIcon></app-icon>
    </pb-input>
  </pb-form-field>

  <pb-form-field>
    <pb-label> {{ "auth.register.password" | transloco }}</pb-label>
    <pb-input
      formControlName="password"
      type="password"
      autocomplete="new-password"
      [placeholder]="'auth.register.passwordPlaceholder' | transloco"
    >
      <app-icon icon="lock" size="m" pbInputIcon></app-icon>
    </pb-input>
  </pb-form-field>

  <pb-form-field>
    <pb-label> {{ "auth.register.confirmPassword" | transloco }}</pb-label>
    <pb-input
      formControlName="confirmPassword"
      type="password"
      autocomplete="new-password"
      [placeholder]="'auth.register.confirmPasswordPlaceholder' | transloco"
    >
      <app-icon icon="lock" size="m" pbInputIcon></app-icon>
    </pb-input>
  </pb-form-field>

  <div class="form-actions">
    <pb-button
      variant="primary"
      size="md"
      [fullWidth]="true"
      [disabled]="!form.valid"
      (click)="onSubmit()"
    >
      {{ "auth.register.register" | transloco }}
    </pb-button>
  </div>
</form>
