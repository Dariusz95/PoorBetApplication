<form pbCardBody [formGroup]="form" (ngSubmit)="onSubmit()">
  <pb-form-field>
    <pb-label> {{ "auth.email.label" | transloco }}</pb-label>
    <pb-input
      formControlName="email"
      testId="login-email-input"
      [placeholder]="'auth.email.placeholder' | transloco"
    >
      <pb-icon icon="mail" size="m" pbInputIcon></pb-icon>
    </pb-input>
  </pb-form-field>

  <pb-form-field>
    <pb-label> {{ "auth.password.label" | transloco }}</pb-label>
    <pb-input
      formControlName="password"
      type="password"
      autocomplete="current-password"
      testId="login-password-input"
      [placeholder]="'auth.password.placeholder' | transloco"
    >
      <pb-icon icon="lock" size="m" pbInputIcon></pb-icon>
    </pb-input>
  </pb-form-field>

  <div class="mt-8 flex flex-col gap-4">
    <pb-button
      variant="primary"
      size="md"
      type="submit"
      testId="login-submit-button"
      [loading]="submitting()"
      [fullWidth]="true"
    >
      {{ "auth.login.login" | transloco }}
    </pb-button>

    <pb-button
      variant="secondary"
      size="md"
      type="button"
      testId="login-test-user-button"
      [fullWidth]="true"
      [loading]="submitting()"
      (click)="loginAsTestUser()"
    >
      {{ "auth.login.loginAsTestUser" | transloco }}
    </pb-button>
  </div>
</form>
