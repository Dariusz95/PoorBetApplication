<div class="login-container">
  <app-pb-card stylesCss="w-full max-w-[420px]">
    <app-auth-card-header
      pbCardHeader
      titleKey="auth.login.title"
      subtitleKey="auth.login.subtitle"
    ></app-auth-card-header>

    <div pbCardBody>
      <app-login-form (submitForm)="onSubmitForm($event)"></app-login-form>

      <div class="auth-footer">
        {{ "auth.login.dontHaveAccount" | transloco }}
        <pb-button
          size="sm"
          type="link"
          variant="link"
          [routerLink]="RoutePath.Register"
        >
          {{ "auth.login.register" | transloco }}
        </pb-button>
      </div>
    </div>
  </app-pb-card>
</div>
