<div
  class="card-wrap"
  [class.card-wrap--highlighted]="variant() === 'highlighted'"
  [class.card-wrap--default]="variant() === 'default'"
>
  @if (variant() === "highlighted") {
    <div class="card__border">
      <div class="card__border-sweep"></div>
    </div>
  }

  <div class="pb-card">
    <header class="pb-card__header" [class.header-exists]="!!header()">
      <ng-content select="[pbCardHeader]"></ng-content>
    </header>
    <div class="pb-card__body">
      <ng-content select="[pbCardBody]"></ng-content>
    </div>
    <footer class="pb-card__footer">
      <ng-content select="[pbCardFooter]"></ng-content>
    </footer>
  </div>
</div>
