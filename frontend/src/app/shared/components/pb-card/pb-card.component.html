<div class="card-wrap">
  <div class="card__border">
    <div class="card__border-sweep"></div>
  </div>

  <div class="pb-card">

      <ng-content select="[pbCardHeader]"></ng-content>
    </header>

      <ng-content select="[pbCardBody]"></ng-content>
    </div>

    </footer>
  </div>
</div>
