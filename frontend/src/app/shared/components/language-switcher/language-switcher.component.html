<app-pb-dropdown
  [options]="languageDropdownOptions"
  [optionTemplate]="optionTemplate"
>
  <span dropdownLabel>
    @if (iconType()) {
      <pb-icon size="lg" [type]="iconType()!"></pb-icon>
    }
  </span>
</app-pb-dropdown>

<ng-template #optionTemplate let-option>
  @if (option.icon) {
    <pb-icon [type]="option.icon"></pb-icon>
  }
  <span>{{ option.label | transloco }}</span>
</ng-template>
