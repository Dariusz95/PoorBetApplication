spring:
  application:
    name: poor-bet-application

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVER_ISSUER:http://authorization-service:9000}
          jwk-set-uri: ${AUTH_SERVER_JWK_SET_URI:http://authorization-service:9000/oauth2/jwks}

web:
  cors:
    allowedOriginPatterns:
      - http://localhost:4200
      - http://127.0.0.1:4200
      - http://127.0.0.1:8080
    allowedMethods:
      - GET
      - POST
      - PATCH
      - PUT
      - DELETE
      - OPTIONS
      - HEAD
    allowedHeaders:
      - Authorization
      - Requestor-Type
    exposedHeaders:
      - Authorization
      - Requestor-Type
    maxAge: 3600

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

apiKey: ${API_KEY}
