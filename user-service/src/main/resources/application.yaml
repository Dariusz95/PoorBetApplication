spring:
  application:
    name: poor-bet-application

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: true
    properties:
      hibernate.default_schema: public

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

web:
  cors:
    allowedOriginPatterns:
      - http://localhost:4200
      - http://127.0.0.1:4200
      - http://127.0.0.1:8080
    allowedMethods:
      - GET
      - POST
      - PATCH
      - PUT
      - DELETE
      - OPTIONS
      - HEAD
    allowedHeaders:
      - Authorization
      - Requestor-Type
    exposedHeaders:
      - Authorization
      - Requestor-Type
    maxAge: 3600

jwt:
  issuer: ${AUTH_ISSUER_URI}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  rsa:
    key-id: ${JWT_KEY_ID:poorbet-key-1}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:classpath:keys/private.pem}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}

oauth:
  clients:
    match-service:
      secret: ${MATCH_SERVICE_CLIENT_SECRET:secret}
      permissions:
        - internal
      audiences:
        - teams-service
        - simulation-service
        - odds-service
    coupon-service:
      secret: ${COUPON_SERVICE_CLIENT_SECRET:secret}
      permissions:
        - internal
      audiences:
        - match-service

poorbet:
  security:
    enabled: true
    jwk-set-uri: ${AUTH_JWKS_URI}
    issuer: ${AUTH_ISSUER_URI}
    unprotected-paths:
      - /api/users/login
      - /api/users/register
      - /oauth/token
      - /.well-known/jwks.json

messaging:
  source-service: user-service

  exchanges:
    match: user.events

