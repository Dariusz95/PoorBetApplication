spring:
  application:
    name: poor-bet-application

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: true
    properties:
      hibernate.default_schema: public

web:
  cors:
    allowedOriginPatterns:
      - http://localhost:4200
      - http://127.0.0.1:4200
      - http://127.0.0.1:8080
    allowedMethods:
      - GET
      - POST
      - PATCH
      - PUT
      - DELETE
      - OPTIONS
      - HEAD
    allowedHeaders:
      - Authorization
      - Requestor-Type
    exposedHeaders:
      - Authorization
      - Requestor-Type
    maxAge: 3600

jwt:
  issuer: ${JWT_ISSUER:http://user-service:8080}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  rsa:
    key-id: ${JWT_KEY_ID:poorbet-key-1}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:classpath:keys/private.pem}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}

apiKey: ${API_KEY}

oauth:
  clients:
    match-service: ${MATCH_SERVICE_CLIENT_SECRET:secret}

poorbet:
  security:
    enabled: false
